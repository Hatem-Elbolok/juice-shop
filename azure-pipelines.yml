trigger: none

pr: none

pool:
  name: CoverityPool
  demands:
    - Agent.OS -equals Windows_NT

variables:
  SEEKER_SERVER_URL: 'https://192.168.1.20:8443'
  SEEKER_PROJECT_KEY: 'Juice-Shop-Azure'
  APP_PORT: '3000'
  APP_URL: 'http://127.0.0.1:3000'

steps:
- checkout: self
  clean: true
  fetchDepth: 1
  displayName: 'Checkout OWASP Juice Shop'

- task: PowerShell@2
  displayName: 'Prepare Pipeline Directories'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      $logDirectory = "$(Build.ArtifactStagingDirectory)\seeker-logs"
      New-Item -ItemType Directory -Path $logDirectory -Force | Out-Null

      Write-Host "Agent name: $(Agent.Name)"
      Write-Host "Agent computer: $(Agent.MachineName)"
      Write-Host "Source directory: $(Build.SourcesDirectory)"
      Write-Host "Log directory: $logDirectory"

- task: PowerShell@2
  displayName: 'Verify Node.js, npm, and Seeker Connectivity'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      node --version
      if ($LASTEXITCODE -ne 0) {
        throw "Node.js is not available to the Azure self-hosted agent."
      }

      npm --version
      if ($LASTEXITCODE -ne 0) {
        throw "npm is not available to the Azure self-hosted agent."
      }

      $connection = Test-NetConnection `
        -ComputerName "192.168.1.20" `
        -Port 8443 `
        -WarningAction SilentlyContinue

      if (-not $connection.TcpTestSucceeded) {
        throw "TCP connection to Seeker Server 192.168.1.20:8443 failed."
      }

      $httpStatus = curl.exe `
        -k `
        -sS `
        -o NUL `
        -w "%{http_code}" `
        "$(SEEKER_SERVER_URL)"

      if ($LASTEXITCODE -ne 0) {
        throw "HTTPS connection to Seeker Server failed."
      }

      if ([int]$httpStatus -lt 200 -or [int]$httpStatus -ge 400) {
        throw "Seeker Server returned unexpected HTTP status: $httpStatus"
      }

      Write-Host "Seeker Server is reachable. HTTP status: $httpStatus"

- task: PowerShell@2
  displayName: 'Install and Build OWASP Juice Shop'
  inputs:
    targetType: 'inline'
    workingDirectory: '$(Build.SourcesDirectory)'
    script: |
      $ErrorActionPreference = 'Stop'

      npm install --no-audit --fund=false

      if ($LASTEXITCODE -ne 0) {
        throw "OWASP Juice Shop dependency installation or build failed."
      }

      $applicationEntry = "$(Build.SourcesDirectory)\build\app.js"

      if (-not (Test-Path -LiteralPath $applicationEntry)) {
        throw "Juice Shop build output was not found: $applicationEntry"
      }

      Write-Host "OWASP Juice Shop dependencies and build completed successfully."

- task: PowerShell@2
  displayName: 'Download and Validate Seeker Node.js Agent'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      $seekerDirectory = Join-Path `
        "$(Agent.TempDirectory)" `
        "seeker-$(Build.BuildId)"

      if (Test-Path -LiteralPath $seekerDirectory) {
        Remove-Item `
          -LiteralPath $seekerDirectory `
          -Recurse `
          -Force
      }

      New-Item `
        -ItemType Directory `
        -Path $seekerDirectory `
        -Force | Out-Null

      $agentUrl = "$(SEEKER_SERVER_URL)/rest/api/latest/installers/agents/binaries/NODEJS?projectKey=$(SEEKER_PROJECT_KEY)&flavor=TARGZ"

      Write-Host "Installing Seeker Agent into: $seekerDirectory"

      npm install `
        --strict-ssl=false `
        --foreground-scripts `
        --prefix "$seekerDirectory" `
        "$agentUrl"

      if ($LASTEXITCODE -ne 0) {
        throw "Seeker Node.js Agent installation failed."
      }

      npm ls `
        --prefix "$seekerDirectory" `
        @seeker/agent

      if ($LASTEXITCODE -ne 0) {
        throw "Seeker Node.js Agent package validation failed."
      }

      $seekerModule = Join-Path `
        $seekerDirectory `
        "node_modules\@seeker\agent"

      if (-not (Test-Path -LiteralPath $seekerModule)) {
        throw "Seeker Agent module was not found: $seekerModule"
      }

      $packageJsonPath = Join-Path $seekerModule "package.json"
      if (-not (Test-Path -LiteralPath $packageJsonPath)) {
        throw "Seeker Agent package.json was not found: $packageJsonPath"
      }

      $packageJson = Get-Content `
        -LiteralPath $packageJsonPath `
        -Raw | ConvertFrom-Json

      if ([string]::IsNullOrWhiteSpace($packageJson.main)) {
        $seekerEntry = $seekerModule
      }
      else {
        $seekerEntry = Join-Path $seekerModule $packageJson.main
      }

      if (-not (Test-Path -LiteralPath $seekerEntry)) {
        throw "Seeker Agent entry file was not found: $seekerEntry"
      }

      Write-Host "Seeker Agent entry: $seekerEntry"
      Write-Host "##vso[task.setvariable variable=SEEKER_AGENT_ENTRY]$seekerEntry"
      Write-Host "Seeker Node.js Agent installed successfully."

- task: PowerShell@2
  displayName: 'Start Instrumented Juice Shop and Generate Test Traffic'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = 'Stop'

      $logDirectory = "$(Build.ArtifactStagingDirectory)\seeker-logs"
      $stdoutLog = Join-Path $logDirectory "juice-shop-stdout.log"
      $stderrLog = Join-Path $logDirectory "juice-shop-stderr.log"
      $applicationEntry = "$(Build.SourcesDirectory)\build\app.js"
      $seekerEntry = "$(SEEKER_AGENT_ENTRY)"

      if (-not (Test-Path -LiteralPath $applicationEntry)) {
        throw "Juice Shop entry file is missing: $applicationEntry"
      }

      if (-not (Test-Path -LiteralPath $seekerEntry)) {
        throw "Seeker Agent entry file is missing: $seekerEntry"
      }

      # LAB ONLY: remove this after installing a trusted Seeker certificate.
      $env:NODE_TLS_REJECT_UNAUTHORIZED = "0"

      $env:SEEKER_SERVER_URL = "$(SEEKER_SERVER_URL)"
      $env:SEEKER_PROJECT_KEY = "$(SEEKER_PROJECT_KEY)"
      $env:PORT = "$(APP_PORT)"

      $nodeExecutable = (Get-Command node.exe -ErrorAction Stop).Source
      $arguments = "--require "$seekerEntry" "$applicationEntry""

      Write-Host "Starting Juice Shop directly with node.exe."
      Write-Host "Node executable: $nodeExecutable"
      Write-Host "Application entry: $applicationEntry"
      Write-Host "Seeker Agent entry: $seekerEntry"
      Write-Host "Application URL: $(APP_URL)"

      $applicationProcess = Start-Process `
        -FilePath $nodeExecutable `
        -ArgumentList $arguments `
        -WorkingDirectory "$(Build.SourcesDirectory)" `
        -RedirectStandardOutput $stdoutLog `
        -RedirectStandardError $stderrLog `
        -PassThru

      try {
        $ready = $false

        # Seeker instrumentation can add startup time. Allow up to 10 minutes.
        for ($attempt = 1; $attempt -le 300; $attempt++) {
          Start-Sleep -Seconds 2

          if ($applicationProcess.HasExited) {
            Write-Host "Juice Shop process exited with code $($applicationProcess.ExitCode)."

            if (Test-Path $stdoutLog) {
              Write-Host "===== Juice Shop stdout ====="
              Get-Content $stdoutLog -Tail 200
            }

            if (Test-Path $stderrLog) {
              Write-Host "===== Juice Shop stderr ====="
              Get-Content $stderrLog -Tail 200
            }

            throw "Juice Shop failed to start."
          }

          if (($attempt % 15) -eq 0) {
            Write-Host "Waiting for Juice Shop... attempt $attempt of 300"

            if (Test-Path $stdoutLog) {
              Write-Host "===== Latest stdout ====="
              Get-Content $stdoutLog -Tail 30
            }

            if (Test-Path $stderrLog) {
              Write-Host "===== Latest stderr ====="
              Get-Content $stderrLog -Tail 30
            }
          }

          try {
            $response = Invoke-WebRequest `
              -Uri "$(APP_URL)" `
              -UseBasicParsing `
              -TimeoutSec 5

            if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 500) {
              $ready = $true
              Write-Host "Juice Shop is ready. HTTP status: $($response.StatusCode)"
              break
            }
          }
          catch {
            # Continue waiting until the timeout is reached.
          }
        }

        if (-not $ready) {
          Write-Host "===== Final Juice Shop stdout ====="
          if (Test-Path $stdoutLog) {
            Get-Content $stdoutLog -Tail 200
          }

          Write-Host "===== Final Juice Shop stderr ====="
          if (Test-Path $stderrLog) {
            Get-Content $stderrLog -Tail 200
          }

          throw "Juice Shop did not become ready within 600 seconds."
        }

        Write-Host "Generating application traffic for Seeker."

        $testUrls = @(
          "$(APP_URL)/",
          "$(APP_URL)/rest/products/search?q=apple",
          "$(APP_URL)/api/Challenges",
          "$(APP_URL)/rest/admin/application-version"
        )

        foreach ($url in $testUrls) {
          Write-Host "Requesting: $url"

          curl.exe `
            -sS `
            -o NUL `
            -w "HTTP %{http_code}`n" `
            "$url"

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Request failed: $url"
          }
        }

        Write-Host "Waiting 60 seconds for Seeker to process runtime activity."
        Start-Sleep -Seconds 60

        Write-Host "Runtime traffic generation completed."
      }
      finally {
        if ($null -ne $applicationProcess -and -not $applicationProcess.HasExited) {
          Write-Host "Stopping Juice Shop process tree."

          taskkill.exe `
            /PID $applicationProcess.Id `
            /T `
            /F | Out-Null
        }
      }

- task: PowerShell@2
  displayName: 'Collect Pipeline Diagnostics'
  condition: always()
  inputs:
    targetType: 'inline'
    script: |
      $logDirectory = "$(Build.ArtifactStagingDirectory)\seeker-logs"
      New-Item -ItemType Directory -Path $logDirectory -Force | Out-Null

      @"
      Build ID: $(Build.BuildId)
      Agent: $(Agent.Name)
      Seeker Server: $(SEEKER_SERVER_URL)
      Seeker Project: $(SEEKER_PROJECT_KEY)
      Application URL: $(APP_URL)
      "@ | Out-File `
        -FilePath (Join-Path $logDirectory "pipeline-summary.txt") `
        -Encoding utf8

- task: PublishPipelineArtifact@1
  displayName: 'Publish Seeker and Juice Shop Logs'
  condition: always()
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)\seeker-logs'
    artifact: 'seeker-pipeline-logs'
    publishLocation: 'pipeline'